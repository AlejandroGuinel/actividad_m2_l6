<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad M2 L6</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="p-4">

    <h2>requisitos</h2>

    <ul id="miLista">
        <li>aprender</li>
        <li>aprobar</li>
        <li>trabajar</li>
        <li>celebrar</li>
        <li>descansar</li>
    </ul>

    <button id="toggleLista" class="btn btn-primary mt-3">
        Ocultar lista
    </button>

    <hr>


    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#miModal">
        Abrir Modal
    </button>

    
    <div class="modal fade" id="miModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modal de ejemplo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                somos el mejor pais de chile🎉
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function(){

            
            $("#miLista li").css("color", "blue");

           
            $("#miLista").append("<li>python</li>");

           
            $("#toggleLista").click(function(){

                $("#miLista").toggle();

                if($("#miLista").is(":visible")){
                    $(this).text("Ocultar lista");
                } else {
                    $(this).text("Mostrar lista");
                }

            });

        });
    </script>

</body>
</html>
